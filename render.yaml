services:
  # Single web service: backend Express server also serves the React frontend.
  # The frontend is built first so backend/src/index.ts finds frontend/dist at start.
  - type: web
    name: ai-tutor-agent
    env: node
    buildCommand: cd backend && npm install && npm run build && cd ../frontend && npm install && npm run build
    startCommand: node backend/dist/index.js
    healthCheckPath: /api/health
    disk:
      name: tutor-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: NODE_ENV
        value: production
      - key: LLM_PROVIDER
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
