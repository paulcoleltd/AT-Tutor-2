# Railway Nixpacks — use npm install (not npm ci) so lockfile drift never fails builds.
# Overrides Nixpacks auto-detected install phase which defaults to 'npm ci'.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "cd backend && npm install && npm run build",
  "cd frontend && npm install && npm run build"
]

[start]
cmd = "node backend/dist/index.js"
