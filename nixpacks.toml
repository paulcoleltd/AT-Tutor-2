# Railway Nixpacks configuration
# Ensures Node 20 LTS is used and both workspaces are installed correctly.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd backend && npm ci",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd backend && npm run build",
  "cd frontend && npm run build"
]

[start]
cmd = "node backend/dist/index.js"
